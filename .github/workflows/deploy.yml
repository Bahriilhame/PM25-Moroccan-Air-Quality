name: Deploy → HuggingFace Space

on:
  push:
    branches: [main]
  workflow_dispatch:         # Permet de déclencher manuellement depuis GitHub

jobs:

  # ── 1. Tests backend ──────────────────────────────────────────────────────
  test:
    name: Tests Python
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip
          cache-dependency-path: backend/requirements.txt

      - name: Install deps
        run: |
          pip install -r backend/requirements.txt
          pip install pytest

      - name: Run tests
        run: pytest tests/ -v --tb=short
        env:
          OWM_API_KEY: "test_key"
          HF_TOKEN:    "test_token"

  # ── 2. Build frontend ─────────────────────────────────────────────────────
  build-frontend:
    name: Build React
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: npm install + build
        working-directory: frontend
        run: |
          npm ci
          npm run build

      - name: Upload dist artifact
        uses: actions/upload-artifact@v4
        with:
          name: frontend-dist
          path: frontend/dist/
          retention-days: 1

  # ── 3. Push vers HuggingFace Space ────────────────────────────────────────
  deploy:
    name: Deploy HF Space
    needs: [test, build-frontend]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Download frontend build
        uses: actions/download-artifact@v4
        with:
          name: frontend-dist
          path: frontend/dist/

      - name: Install huggingface_hub
        run: pip install huggingface_hub

      - name: Push to HuggingFace Space
        env:
          HF_TOKEN: ${{ secrets.HF_TOKEN }}
        run: |
          python - << 'PYEOF'
          import os
          from huggingface_hub import HfApi

          api   = HfApi(token=os.environ["HF_TOKEN"])
          repo  = "bahriilhame/PM2.5-Moroccan-Air-Quality"
          rtype = "space"

          # Fichiers racine
          for f in ["Dockerfile", "nginx.conf", "start.sh", "README.md"]:
              if os.path.exists(f):
                  api.upload_file(path_or_fileobj=f, path_in_repo=f,
                                  repo_id=repo, repo_type=rtype)
                  print(f"✅ {f}")

          # Backend complet
          api.upload_folder(
              folder_path="backend",
              path_in_repo="backend",
              repo_id=repo, repo_type=rtype,
              ignore_patterns=["__pycache__", "*.pyc", "*.egg-info", ".env"],
          )
          print("✅ backend/")

          # Frontend dist buildé
          api.upload_folder(
              folder_path="frontend/dist",
              path_in_repo="frontend/dist",
              repo_id=repo, repo_type=rtype,
          )
          print("✅ frontend/dist/")

          print("🚀 Deploy terminé vers", repo)
          PYEOF
